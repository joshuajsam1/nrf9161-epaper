# =============================================================================
# nRF9161 DK — e-Paper SMS Display
# Receives SMS via LTE modem and renders it on Waveshare 7.5" e-ink display
# =============================================================================

# ---- Heap (framebuffer 800*480/8 = 48000 bytes + modem overhead) -----------
CONFIG_HEAP_MEM_POOL_SIZE=65000

# ---- SPI / GPIO (for e-paper) -----------------------------------------------
CONFIG_SPI=y
CONFIG_GPIO=y

# ---- MIPI DBI + Display subsystem ------------------------------------------
CONFIG_MIPI_DBI=y
CONFIG_DISPLAY=y
CONFIG_UC81XX=y

# ---- Modem library ----------------------------------------------------------
CONFIG_NRF_MODEM_LIB=y

# ---- LTE link control -------------------------------------------------------
CONFIG_LTE_LINK_CONTROL=y

# ---- SMS library ------------------------------------------------------------
CONFIG_SMS=y
CONFIG_SMS_SUBSCRIBERS_MAX_CNT=1

# ---- Networking (required by SMS) ------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_POSIX_API=y

# ---- Font data (provides cfb_font_1016 used by direct fb renderer) ---------
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_CHARACTER_FRAMEBUFFER_USE_DEFAULT_FONTS=y

# ---- Stack sizes -----------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ---- Logging (UART + RTT so logs are visible via either channel) -----------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=y
