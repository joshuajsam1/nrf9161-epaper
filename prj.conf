# =============================================================================
# nRF9161 DK + Waveshare 7.5" e-Paper (GDEW075T7 / UC8179, 800x480)
# =============================================================================

# Heap: 800*480/8 = 48000 bytes for framebuffer + overhead
CONFIG_HEAP_MEM_POOL_SIZE=56000

# SPI bus (SPI3 / Arduino header)
CONFIG_SPI=y

# GPIO for DC, RST, BUSY control pins
CONFIG_GPIO=y

# MIPI DBI interface layer (required by UC8179 driver)
CONFIG_MIPI_DBI=y

# Display subsystem
CONFIG_DISPLAY=y

# UC8179 e-paper controller driver (for GDEW075T7 / 7.5" 800x480)
CONFIG_UC8179=y

# Character Framebuffer for text output (no LVGL required)
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_CHARACTER_FRAMEBUFFER_USE_DEFAULT_FONTS=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
